<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway | S26X AUTO JWT UPDATER PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000; color: #e5e5e5; font-family: 'Inter', sans-serif; overflow: hidden; }
        .mono-text { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .mono-card { position: relative; }
        .mono-card::before {
            content: ""; position: absolute; inset: -1px; border-radius: 1.5rem; background: linear-gradient(45deg, #222, #555, #888, #555, #222); background-size: 400%; z-index: -1; animation: glowing 8s linear infinite; filter: blur(6px); opacity: 0.6;
        }
        .mono-card::after {
            content: ""; position: absolute; inset: -1px; border-radius: 1.5rem; background: linear-gradient(45deg, #111, #333, #666, #333, #111); background-size: 400%; z-index: -1; animation: glowing 8s linear infinite;
        }
        @keyframes glowing { 0% { background-position: 0 0; } 50% { background-position: 400% 0; } 100% { background-position: 0 0; } }
        
        .glass { background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(20px); }

        .s26x-overlay {
            position: absolute; inset: 0; background: #000; border-radius: 1.5rem; z-index: 50; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.15s ease-in-out;
        }
        .s26x-overlay.active { opacity: 1; pointer-events: all; }
        .s26x-text {
            font-size: 3rem; font-weight: 900; letter-spacing: 0.5rem; color: #fff; text-shadow: 0 0 10px #fff, 0 0 20px #888; transform: scale(0.5); opacity: 0;
        }
        .s26x-overlay.active .s26x-text {
            animation: revealS26X 0.6s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes revealS26X { 0% { transform: scale(0.1); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(1.1); opacity: 1; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-zinc-900 via-black to-black">

    <div class="w-full max-w-md mono-card">
        <div class="glass p-10 rounded-3xl shadow-2xl relative z-10 text-center border border-zinc-800 overflow-hidden">
            
            <div id="s26xOverlay" class="s26x-overlay">
                <h1 class="s26x-text">S 2 6 X</h1>
            </div>

            <div class="mb-8">
                <img src="https://i.ibb.co/Z0wtdsB/photo-2026-07-04-12-28-24.jpg" alt="S26X Logo" class="w-20 h-20 mx-auto rounded-2xl shadow-[0_0_20px_rgba(255,255,255,0.1)] mb-6 transform rotate-3 hover:rotate-0 transition-all duration-200 object-cover border border-zinc-700">
                
                <h1 class="text-3xl font-black tracking-tighter uppercase mb-2 leading-tight">
                    <span class="bg-gradient-to-r from-zinc-100 to-zinc-400 mono-text">S26X AUTO</span><br>
                    <span class="bg-gradient-to-r from-zinc-400 to-zinc-600 mono-text text-xl">JWT UPDATER PRO</span>
                </h1>
                <p class="text-[10px] font-bold text-zinc-600 uppercase tracking-[0.3em] mt-3">Secure Gateway Protocol</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="relative group">
                    <input type="password" id="token" placeholder="Enter Access Token" required 
                        class="w-full px-5 py-4 bg-black border border-zinc-800 rounded-xl text-center text-sm font-bold text-white focus:border-zinc-500 focus:ring-1 focus:ring-zinc-500 outline-none transition-all placeholder-zinc-700 group-hover:border-zinc-700 shadow-inner">
                </div>
                
                <p id="errorMsg" class="text-red-400 text-xs font-bold hidden bg-red-900/20 py-2 rounded-lg border border-red-500/20"></p>

                <button type="submit" class="w-full bg-gradient-to-r from-zinc-800 via-zinc-700 to-zinc-900 hover:from-zinc-700 hover:via-zinc-600 hover:to-zinc-800 text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest transition-all transform hover:-translate-y-1 shadow-[0_5px_20px_rgba(255,255,255,0.05)] border border-zinc-700">
                    Initialize Session
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const errorMsg = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse">VERIFYING...</span>`;
            
            try {
                const res = await fetch('/verify_password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: document.getElementById('token').value})
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    btn.innerHTML = `ACCESS GRANTED`;
                    btn.classList.replace('from-zinc-800', 'from-zinc-300');
                    btn.classList.replace('via-zinc-700', 'via-zinc-400');
                    btn.classList.replace('to-zinc-900', 'to-zinc-500');
                    btn.classList.add('text-black');
                    
                    setTimeout(() => {
                        document.getElementById('s26xOverlay').classList.add('active');
                    }, 100);

                    setTimeout(() => window.location.href = data.redirect, 800); 
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = "INITIALIZE SESSION";
                }
            } catch (err) {
                errorMsg.innerText = "Connection Error";
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "INITIALIZE SESSION";
            }
        };
    </script>
</body>
</html>
