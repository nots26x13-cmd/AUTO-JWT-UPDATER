<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gateway | DEVIL 100K</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; overflow: hidden; }
        .rgb-text { background-clip: text; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .rgb-card { position: relative; }
        .rgb-card::before {
            content: ""; position: absolute; inset: -2px; border-radius: 1.5rem; background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); background-size: 400%; z-index: -1; animation: glowing 20s linear infinite; filter: blur(8px); opacity: 0.7;
        }
        .rgb-card::after {
            content: ""; position: absolute; inset: -2px; border-radius: 1.5rem; background: linear-gradient(45deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000); background-size: 400%; z-index: -1; animation: glowing 20s linear infinite;
        }
        @keyframes glowing { 0% { background-position: 0 0; } 50% { background-position: 400% 0; } 100% { background-position: 0 0; } }
        
        .glass { background: rgba(2, 6, 23, 0.9); backdrop-filter: blur(20px); }

        .devil-overlay {
            position: absolute; inset: 0; background: #050000; border-radius: 1.5rem; z-index: 50; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.4s ease-in-out;
        }
        .devil-overlay.active { opacity: 1; pointer-events: all; }
        .devil-text {
            font-size: 3.5rem; font-weight: 900; letter-spacing: 0.8rem; color: #ff0000; text-shadow: 0 0 10px #ff0000, 0 0 30px #8b0000, 0 0 50px #ff0000; transform: scale(0.5); opacity: 0;
        }
        .devil-overlay.active .devil-text {
            animation: revealDevil 2s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275), glitch 0.2s infinite alternate;
        }

        @keyframes revealDevil { 0% { transform: scale(0.1); opacity: 0; } 50% { opacity: 1; } 100% { transform: scale(1.1); opacity: 1; } }
        @keyframes glitch { 0% { text-shadow: 3px 3px #ff0000, -3px -3px #000; } 100% { text-shadow: -3px -3px #ff0000, 3px 3px #000; } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-slate-900 via-[#020617] to-black">

    <div class="w-full max-w-md rgb-card">
        <div class="glass p-10 rounded-3xl shadow-2xl relative z-10 text-center border border-slate-800/50 overflow-hidden">
            
            <div id="devilOverlay" class="devil-overlay">
                <h1 class="devil-text">D E V I L</h1>
            </div>

            <div class="mb-8">
                <div class="w-16 h-16 mx-auto bg-gradient-to-tr from-red-600 to-orange-500 rounded-2xl flex items-center justify-center shadow-[0_0_30px_rgba(220,38,38,0.3)] mb-6 transform rotate-3 hover:rotate-0 transition-all duration-500">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
                <h1 class="text-4xl font-black tracking-tighter uppercase mb-2">
                    <span class="bg-gradient-to-r from-red-500 to-orange-500 rgb-text">DEVIL</span>
                    <span class="bg-gradient-to-r from-red-700 to-purple-600 rgb-text">100K</span>
                </h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.3em]">Secure Gateway Protocol</p>
            </div>

            <form id="loginForm" class="space-y-6">
                <div class="relative group">
                    <input type="password" id="token" placeholder="Enter Access Token" required 
                        class="w-full px-5 py-4 bg-slate-950/80 border border-slate-700 rounded-xl text-center text-sm font-bold text-white focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all placeholder-slate-600 group-hover:border-slate-500 shadow-inner">
                </div>
                
                <p id="errorMsg" class="text-red-400 text-xs font-bold hidden bg-red-500/10 py-2 rounded-lg border border-red-500/20"></p>

                <button type="submit" class="w-full bg-gradient-to-r from-red-600 via-orange-600 to-red-800 hover:from-red-500 hover:via-orange-500 hover:to-red-700 text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest transition-all transform hover:-translate-y-1 shadow-[0_10px_40px_-10px_rgba(220,38,38,0.5)]">
                    Initialize Session
                </button>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const errorMsg = document.getElementById('errorMsg');
            btn.disabled = true;
            btn.innerHTML = `<span class="animate-pulse">VERIFYING ENCRYPTION...</span>`;
            
            try {
                const res = await fetch('/verify_password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({password: document.getElementById('token').value})
                });
                const data = await res.json();
                
                if (data.status === 'success') {
                    btn.innerHTML = `ACCESS GRANTED`;
                    btn.classList.replace('from-red-600', 'from-emerald-600');
                    btn.classList.replace('via-orange-600', 'via-emerald-500');
                    btn.classList.replace('to-red-800', 'to-emerald-700');
                    
                    setTimeout(() => {
                        document.getElementById('devilOverlay').classList.add('active');
                    }, 400);

                    setTimeout(() => window.location.href = data.redirect, 2500); 
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerText = "INITIALIZE SESSION";
                }
            } catch (err) {
                errorMsg.innerText = "Connection Error";
                errorMsg.classList.remove('hidden');
                btn.disabled = false;
                btn.innerText = "INITIALIZE SESSION";
            }
        };
    </script>
</body>
</html>
